name: Add a Resource
description: Suggest a plugin, patch, tool, or resource to add to the list
title: "Add: [resource name]"
labels: ["addition"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a resource! Please fill in the details below.
        If you're comfortable with Git, consider opening a Pull Request instead — it's faster.

  - type: input
    id: name
    attributes:
      label: Resource name
      description: The name of the plugin, tool, patch, or resource
      placeholder: e.g. myplugin.koplugin
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: URL
      description: Link to the GitHub repo, website, or documentation
      placeholder: https://github.com/author/repo
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: Resource type
      options:
        - Plugin (.koplugin)
        - User Patch (lua)
        - Sync Server
        - Desktop Tool / Companion App
        - Calibre Plugin
        - Script / Automation
        - Theme / Icons
        - Guide / Tutorial
        - Community Resource
        - Other
    validations:
      required: true

  - type: input
    id: category
    attributes:
      label: Suggested category
      description: Which section of the README should this go in?
      placeholder: e.g. AI & Assistants, RSS & Read-It-Later

  - type: textarea
    id: description
    attributes:
      label: One-sentence description
      description: Describe what the resource does — concise, starting with a capital letter, ending with a period.
      placeholder: e.g. Syncs reading progress to Hardcover.app after finishing each session.
    validations:
      required: true

  - type: input
    id: koreader-version
    attributes:
      label: KOReader version compatibility
      description: Which KOReader version(s) is this compatible with? Leave blank if unknown.
      placeholder: e.g. v2025.04+, or "latest stable"

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: The project is publicly accessible
          required: true
        - label: The project has a README with installation instructions
          required: true
        - label: This is not already listed in the README
          required: true
