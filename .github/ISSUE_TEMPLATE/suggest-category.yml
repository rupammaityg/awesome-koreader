name: Suggest a New Category
description: Propose a new section or category for the list
title: "Category: [category name]"
labels: ["category"]
body:
  - type: markdown
    attributes:
      value: |
        New categories need at least **3 entries** to justify their own section.
        Please list the entries you'd include.

  - type: input
    id: name
    attributes:
      label: Proposed category name
      placeholder: e.g. Archive Reading Tools
    validations:
      required: true

  - type: textarea
    id: rationale
    attributes:
      label: Why does this need its own category?
      description: Explain what's missing or why existing categories don't fit.
    validations:
      required: true

  - type: textarea
    id: entries
    attributes:
      label: Entries to include (min. 3)
      description: List the resources that belong in this category with links.
      placeholder: |
        - [name](url) - description
        - [name](url) - description
        - [name](url) - description
    validations:
      required: true
