name: Broken Link / Outdated Entry
description: Report a broken link, outdated project, or incorrect information
title: "Fix: [resource name]"
labels: ["maintenance"]
body:
  - type: markdown
    attributes:
      value: Thanks for helping keep the list accurate!

  - type: input
    id: entry
    attributes:
      label: Entry name
      description: The name of the entry that has an issue
      placeholder: e.g. zlibrary.koplugin
    validations:
      required: true

  - type: dropdown
    id: issue-type
    attributes:
      label: Issue type
      options:
        - Broken / dead link
        - Project is abandoned / unmaintained
        - Wrong category
        - Description is inaccurate
        - Duplicate entry
        - Other
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: Details
      description: Describe the problem and, if possible, provide the correct information or a replacement link.
    validations:
      required: true
